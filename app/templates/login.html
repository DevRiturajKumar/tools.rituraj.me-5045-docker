<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
[x-cloak] { display: none !important; }
.glass { backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%); }
.animate-gradient { background-size: 200% 200%; animation: gradient 8s ease infinite; }
@keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.animate-float { animation: float 6s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
.animate-spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #a7f3d0; border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: #34d399; }
.dark ::-webkit-scrollbar-thumb { background: #065f46; }
.dark ::-webkit-scrollbar-thumb:hover { background: #059669; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.animate-slide-up { animation: slideUp 0.3s ease-out; }
.skeleton { background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.gradient-border { position: relative; }
.gradient-border::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px; background: linear-gradient(135deg, #059669, #10b981, #34d399, #059669); background-size: 300% 300%; animation: gradient 4s ease infinite; -webkit-mask: linear-gradient(#fff,#fff) content-box, linear-gradient(#fff,#fff); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
</style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300 min-h-screen flex flex-col items-center justify-center p-4" style="min-height:100%">
  <!-- Backdrop orbs -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-emerald-400/10 dark:bg-emerald-500/5 rounded-full blur-3xl animate-float"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-teal-400/10 dark:bg-teal-500/5 rounded-full blur-3xl animate-float" style="animation-delay: -3s;"></div>
  </div>

  <div class="w-full max-w-md animate-slide-up">
    <div class="text-center mb-8">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg bg-gradient-to-br from-emerald-500 to-teal-600 shadow-emerald-500/20">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">
        <span class="bg-gradient-to-r from-emerald-600 via-teal-500 to-emerald-400 bg-clip-text text-transparent bg-[length:200%] animate-gradient">Raj_AI Tools</span>
      </h1>
      <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Skills Dashboard</p>
    </div>

    <div class="bg-white dark:bg-gray-800/80 rounded-2xl shadow-xl p-6 sm:p-8 border border-gray-100 dark:border-gray-700/50">
      {% if error %}
      <div class="bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 px-4 py-3 rounded-xl text-sm mb-6 border border-red-100 dark:border-red-800/30">{{ error }}</div>
      {% endif %}

      {% if step == 'password' %}
      <form method="post" class="space-y-5">
        <input type="hidden" name="step" value="password">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Username</label>
          <input type="text" name="username" required autocomplete="username"
                 class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password</label>

            <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100">
        </div>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-emerald-600 to-teal-500 text-white font-semibold rounded-xl hover:from-emerald-500 hover:to-teal-400 transition shadow-lg shadow-emerald-500/20">
          Sign In
        </button>
      </form>
      {% else %}
      <form method="post" class="space-y-5">
        <input type="hidden" name="step" value="totp">
        <div class="text-center">
          <div class="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">Enter the 6-digit code from your authenticator app</p>
        </div>
        <div>
          <input type="text" name="totp_code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code" placeholder="000000"
                 class="w-full text-center text-2xl tracking-[0.5em] px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 font-mono">
        </div>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-emerald-600 to-teal-500 text-white font-semibold rounded-xl hover:from-emerald-500 hover:to-teal-400 transition shadow-lg shadow-emerald-500/20">
          Verify & Sign In
        </button>
      </form>
      {% endif %}
    </div>

    <p class="text-center text-xs text-gray-400 dark:text-gray-600 mt-6">Raj_AI Tools &mdash; Skills Dashboard</p>
  </div>
</body>
</html>
